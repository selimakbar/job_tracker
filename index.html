<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
    <title>Job Tracker</title>
  </head>
  <body class="">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-[#003366] mb-6">Job Application Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <div class="stats shadow bg-white border-none rounded-sm">
                <div class="stat p-6">
                    <div class="stat-title text-gray-500 font-semibold text-xs uppercase">Total</div>
                    <div id="total-count" class="stat-value text-[#003366] text-4xl mt-2">8</div>
                </div>
            </div>

            <div class="stats shadow bg-white border-none rounded-sm">
                <div class="stat p-6">
                    <div class="stat-title text-gray-500 font-semibold text-xs uppercase">Interview</div>
                    <div id="interview-count" class="stat-value text-[#22c55e] text-4xl mt-2">0</div>
                </div>
            </div>

            <div class="stats shadow bg-white border-none rounded-sm">
                <div class="stat p-6">
                    <div class="stat-title text-gray-500 font-semibold text-xs uppercase">Rejected</div>
                    <div id="rejected-count" class="stat-value text-[#ef4444] text-4xl mt-2">0</div>
                </div>
            </div>

        </div>
    </div>
    
    <div class="max-w-4xl pt-10 mx-auto">
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-[#003366]">Available Jobs</h2>
    <span class="text-gray-500 font-semibold">8 jobs</span>
</div>

<div class="flex gap-2 mb-8">
    <button class="btn btn-sm bg-blue-600 text-white border-none">All</button>
    <button class="btn btn-sm btn-ghost bg-white shadow-sm border text-gray-400">Interview</button>
    <button class="btn btn-sm btn-ghost bg-white shadow-sm border text-gray-400">Rejected</button>
</div>
    </div>
<script src="script.js"></script>
  </body>
</html>
